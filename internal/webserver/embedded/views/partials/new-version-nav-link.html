{{if .NewVersionAvailable}}
{{if .WithDivider}}<li><hr class="dropdown-divider"></li>{{end}}
{{if .DropdownItem}}
<li><a class="dropdown-item" href="{{.NewVersionDownloadURL}}" target="_blank" rel="noopener noreferrer"><i class="bi bi-download me-2" aria-hidden="true"></i>{{t .Lang "New version available"}}</a></li>
{{else}}
<li class="nav-item">
    <a class="nav-link{{if .Compact}} d-flex align-items-center gap-2 py-2 px-0{{end}}" href="{{.NewVersionDownloadURL}}" target="_blank" rel="noopener noreferrer">
        <i class="bi bi-download" aria-hidden="true"></i>
        {{t .Lang "New version available"}}
    </a>
</li>
{{end}}
{{end}}
