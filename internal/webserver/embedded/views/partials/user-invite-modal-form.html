<form method="POST" action="/users/invite" autocomplete="off"
      hx-post="/users/invite"
      hx-target="#invite-user-modal-content"
      hx-swap="innerHTML"
      hx-indicator="#invite-send-spinner"
      hx-disabled-elt="#invite-send-submit"
      data-success-message='{{t .Lang "Invitations sent successfully"}}'
      data-close-modal="#inviteUserModal">
    <div class="modal-header">
        <h2 class="modal-title fs-5" id="inviteUserModalLabel">{{t .Lang "Invite users"}}</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label='{{t .Lang "Close"}}'></button>
    </div>
    <div class="modal-body">
        <div class="mb-3">
            <label for="invite-email" class="form-label">{{t .Lang "Email addresses"}}</label>
            <textarea name="email" id="invite-email" class='form-control {{if ne (index .InviteFormErrors "email") ""}}is-invalid{{end}}' required="required" maxlength="{{if .InviteEmailListMaxLength}}{{.InviteEmailListMaxLength}}{{else}}2000{{end}}" rows="4" placeholder="one@example.com, other@example.com">{{.InviteFormEmail}}</textarea>
            <div class="form-text">{{t .Lang "Separate multiple email addresses with commas."}}</div>
            {{if ne (index .InviteFormErrors "email") ""}}
            <div class="invalid-feedback d-block">
                {{index .InviteFormErrors "email"}}
            </div>
            {{end}}
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{t .Lang "Cancel"}}</button>
        <button type="submit" id="invite-send-submit" class="btn btn-primary d-inline-flex align-items-center">
            <span id="invite-send-spinner" class="spinner-border spinner-border-sm htmx-indicator me-2" role="status" aria-hidden="true"></span>
            {{t .Lang "Send invitation"}}
        </button>
    </div>
</form>
