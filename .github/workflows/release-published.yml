name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Mage
        run: "go install github.com/magefile/mage@v1.17.2"

      - name: Build cross-platform archives
        run: "$(go env GOPATH)/bin/mage Release"

      - name: Upload archives to release
        uses: softprops/action-gh-release@v2
        with:
          files: coreander_*.zip
