name: Release binaries

on:
  release:
    types: [published]
  pull_request:

# One job always runs so GitHub never reports “No jobs were run” (that happens when
# every job is skipped due to job-level `if:`). PRs only run the echo step; release
# steps run only on `release`.
jobs:
  release-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pull request — release upload does not run here
        if: github.event_name == 'pull_request'
        run: echo "Binaries are built and attached when a release is published."

      - name: Checkout
        if: github.event_name == 'release'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        if: github.event_name == 'release'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Mage
        if: github.event_name == 'release'
        run: go install github.com/magefile/mage@v1.17.2

      - name: Build cross-platform archives
        if: github.event_name == 'release'
        run: "$(go env GOPATH)/bin/mage" Release

      - name: Upload archives to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: coreander_*.zip
