name: Release binaries

on:
  release:
    types: [published]
  # PRs: only a no-op job runs so GitHub does not report “No jobs were run” for this file.
  # Cross-compiles and uploads still happen only on `release`.
  pull_request:

permissions:
  contents: read

jobs:
  pr-up-to-date:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Release workflow is release-only
        run: echo "Binaries are built and attached when a release is published, not from this PR."

  build-and-upload:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Mage
        run: go install github.com/magefile/mage@v1.17.2

      - name: Build cross-platform archives
        run: "$(go env GOPATH)/bin/mage" Release

      - name: Upload archives to release
        uses: softprops/action-gh-release@v2
        with:
          files: coreander_*.zip
