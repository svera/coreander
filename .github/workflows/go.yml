name: Go

on:
  push:
    branches: [main, develop]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build .

      - name: Test
        run: go test -v ./... --cover

  release-assets:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Mage
        run: go install github.com/magefile/mage@v1.17.2

      - name: Build cross-platform archives
        run: "$(go env GOPATH)/bin/mage" Release

      - name: Upload archives to release
        uses: softprops/action-gh-release@v2
        with:
          files: coreander_*.zip
